name: Integration Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Run LocalStack integration tests
        run: ./mvnw -B clean verify -Pintegration-tests
